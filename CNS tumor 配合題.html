<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNS tumor 配合題網站</title>
  <style>
    :root {
      --primary: #2563eb;
      --correct: #16a34a;
      --wrong: #dc2626;
      --selected: #7c3aed;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --group: #0f766e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem 1rem 3rem;
    }

    header {
      text-align: center;
      padding: 1.25rem 0 0.75rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary);
    }

    header p {
      font-size: .85rem;
      color: var(--muted);
      margin-top: .2rem;
      line-height: 1.45;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
      margin: .75rem 0 .7rem;
    }

    .cat-btn {
      padding: .4rem .9rem;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      transition: all .15s;
    }

    .cat-btn:hover { border-color: var(--primary); color: var(--primary); }
    .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .categories-secondary .cat-btn.active { background: var(--group); border-color: var(--group); }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: .5rem;
      margin-bottom: .75rem;
      flex-wrap: wrap;
    }

    .tool-btn {
      padding: .4rem 1rem;
      border: 2px solid var(--border);
      border-radius: .5rem;
      background: var(--card);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      transition: all .15s;
    }

    .tool-btn:hover { border-color: var(--primary); color: var(--primary); }
    .tool-btn.answer-btn { border-color: #d97706; color: #d97706; }
    .tool-btn.answer-btn:hover { background: #fffbeb; }

    .status {
      text-align: center;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: .75rem;
    }

    .status b { color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .col-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
      margin-bottom: .3rem;
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }

    .tile {
      padding: .7rem .9rem;
      border: 2px solid var(--border);
      border-radius: .6rem;
      background: var(--card);
      cursor: pointer;
      font-size: .82rem;
      line-height: 1.48;
      transition: border-color .12s, background .12s, opacity .12s;
      user-select: none;
      min-height: 2.9rem;
      text-align: left;
    }

    .tile:hover:not(.matched):not(.flashing) {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    .tile.selected {
      border-color: var(--selected);
      background: #f5f3ff;
    }

    .tile.matched {
      border-color: var(--correct);
      background: #f0fdf4;
      color: var(--correct);
      cursor: default;
      opacity: .75;
    }

    .tile.flashing {
      border-color: var(--wrong);
      background: #fef2f2;
      animation: shake .35s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .result {
      display: none;
      text-align: center;
      max-width: 420px;
      margin: 1.5rem auto 0;
      padding: 1.75rem 1.5rem;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
    }

    .result.show { display: block; }
    .result .big { font-size: 3.5rem; font-weight: 900; line-height: 1; }
    .result .big.perfect { color: var(--correct); }
    .result .big.good { color: #d97706; }
    .result .big.bad { color: var(--wrong); }

    .result p {
      color: var(--muted);
      margin: .6rem 0 1.25rem;
      font-size: .9rem;
      line-height: 1.55;
    }

    .result button {
      padding: .65rem 1.5rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: .6rem;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 700;
      transition: background .15s;
    }

    .result button:hover { background: #1d4ed8; }

    #answerView {
      max-width: 1100px;
      margin: 0 auto;
    }

    .answer-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }

    .answer-table th {
      background: var(--primary);
      color: #fff;
      padding: .5rem .75rem;
      text-align: left;
      font-weight: 700;
      font-size: .75rem;
      letter-spacing: .04em;
    }

    .answer-table th:first-child { border-radius: .5rem 0 0 0; }
    .answer-table th:last-child  { border-radius: 0 .5rem 0 0; }

    .answer-table td {
      padding: .58rem .75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.48;
      background: var(--card);
    }

    .answer-table tr:nth-child(even) td { background: #f8fafc; }
    .answer-table tr:last-child td { border-bottom: none; }

    .hidden { display: none !important; }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .tile { font-size: .79rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="pageTitle">CNS tumor 配合題網站</h1>
    <p id="pageSubtitle">以 `CNS tumor 整理.md` 的整理架構為欄位。先選上方分類 / 群組，再選練習欄位，最後做左右配對。</p>
  </header>

  <div class="categories categories-secondary" id="groupChips"></div>

    <button id="playAgainBtn">再試一次</button>

        ihc_test: "Supporting classification depends on location plus molecular subtype rather than one single IHC panel in the file",
        prognosis: "Prognosis tracks resection extent and molecular subtype more than grade；PFA poor，several others good"
      },
      {
        group: "脈絡叢腫瘤",

        type_grading: "Papillary neoplasms；papilloma grade 1 / atypical papilloma grade 2 / carcinoma grade 3",
        age: "Children usually lateral ventricle；adults usually fourth ventricle",

        grading_criteria: "Papilloma has low or absent mitosis；atypical papilloma has increased mitoses；carcinoma usually >5 mitoses / 10 HPF plus density，pleomorphism，pattern loss，and necrosis",

      {

    const config = QUIZ_CONFIG || {};

    const mixedGroupLabel = config.mixedGroupLabel || "全部混合";

    const FIELD_OPTIONS =
      Array.isArray(config.fieldOptions) && config.fieldOptions.length > 0
        ? config.fieldOptions
        : [{ key: "clue", label: "線索" }];

    const derivedGroups = [...new Set(rows.map((row) => row.group).filter(Boolean))];
    const configuredGroups =
      Array.isArray(config.groupOptions) && config.groupOptions.length > 0
        ? config.groupOptions.filter(Boolean)
        : derivedGroups;
    const GROUP_OPTIONS = configuredGroups.includes(mixedGroupLabel)
      ? configuredGroups
      : [...configuredGroups, mixedGroupLabel];

    const MIXED_LIMIT = config.mixedLimit || 16;

    let currentGroup = config.defaultGroup || GROUP_OPTIONS[GROUP_OPTIONS.length - 1] || mixedGroupLabel;
    let currentField = config.defaultField || FIELD_OPTIONS[0].key;
    let pairs = [];
    let matched = 0;
    let errors = 0;
    let selClue = null;
    let selAns = null;
    let answerMode = false;

    const elements = {
      title: document.getElementById("pageTitle"),
      subtitle: document.getElementById("pageSubtitle"),
      answerColLabel: document.getElementById("answerColLabel"),
      answerTableHeader: document.getElementById("answerTableHeader"),
      fieldHeaderLabel: document.getElementById("fieldHeaderLabel"),
      groupChips: document.getElementById("groupChips"),
      fieldChips: document.getElementById("fieldChips"),
      clueCol: document.getElementById("clueCol"),
      answerCol: document.getElementById("answerCol"),
      statusBar: document.getElementById("statusBar"),
      progressText: document.getElementById("progressText"),
      errorText: document.getElementById("errorText"),
      quizView: document.getElementById("quizView"),
      answerView: document.getElementById("answerView"),
      answerBody: document.getElementById("answerBody"),
      fieldHeader: document.getElementById("fieldHeader"),
      toggleAnswerBtn: document.getElementById("toggleAnswerBtn"),
      resultCard: document.getElementById("resultCard"),
      resultScore: document.getElementById("resultScore"),
      resultText: document.getElementById("resultText"),
      resetBtn: document.getElementById("resetBtn"),
      playAgainBtn: document.getElementById("playAgainBtn")
    };

    function shuffle(list) {
      return [...list].sort(() => Math.random() - 0.5);
    }

    function getFieldLabel() {
      return FIELD_OPTIONS.find((item) => item.key === currentField)?.label ?? currentField;
    }

    function buildPool() {
      let pool = rows;
      if (currentGroup !== mixedGroupLabel) {
        pool = pool.filter((row) => row.group === currentGroup);
      }

      pool = pool.filter((row) => {
        const clueValue = row[currentField];
        return typeof clueValue === "string" && clueValue.trim().length > 0 && typeof row.answer === "string" && row.answer.trim().length > 0;
      });

      if (currentGroup === mixedGroupLabel && pool.length > MIXED_LIMIT) {
        pool = shuffle(pool).slice(0, MIXED_LIMIT);
      }

      return pool.map((row, index) => ({
        id: `${row.group || "group"}-${row.answer}-${index}`,
        clue: row[currentField],
        answer: row.answer
      }));
    }

    function updateStats() {
      elements.progressText.textContent = `${matched} / ${pairs.length}`;
      elements.errorText.textContent = String(errors);
    }

    function createChip(text, isActive, onClick) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `cat-btn${isActive ? " active" : ""}`;
      button.textContent = text;
      button.addEventListener("click", onClick);
      return button;
    }

    function renderFilters() {
      elements.groupChips.innerHTML = "";
      GROUP_OPTIONS.forEach((group) => {
        elements.groupChips.appendChild(
          createChip(group, group === currentGroup, () => {
            currentGroup = group;
            hideAnswers();
            startGame();
          })
        );
      });

      elements.fieldChips.innerHTML = "";
      FIELD_OPTIONS.forEach((field) => {
        elements.fieldChips.appendChild(
          createChip(field.label, field.key === currentField, () => {
            currentField = field.key;
            hideAnswers();
            startGame();
          })
        );
      });
    }

    function makeTile(text, id, type) {
      const tile = document.createElement("button");
      tile.type = "button";
      tile.className = "tile";
      tile.textContent = text;
      tile.dataset.id = id;
      tile.dataset.type = type;
      tile.addEventListener("click", () => onTile(tile));
      return tile;
    }

    function renderBoard() {
      const shuffledClues = shuffle(pairs.map((pair) => ({ id: pair.id, text: pair.clue })));
      const shuffledAnswers = shuffle(pairs.map((pair) => ({ id: pair.id, text: pair.answer })));
      elements.clueCol.innerHTML = "";
      elements.answerCol.innerHTML = "";
      shuffledClues.forEach((item) => elements.clueCol.appendChild(makeTile(item.text, item.id, "clue")));
      shuffledAnswers.forEach((item) => elements.answerCol.appendChild(makeTile(item.text, item.id, "answer")));
    }

    function clearSelected(type) {
      document.querySelectorAll(`.tile[data-type="${type}"].selected`).forEach((tile) => {
        tile.classList.remove("selected");
      });
    }

    function onTile(tile) {
      if (tile.classList.contains("matched") || tile.classList.contains("flashing")) {
        return;
      }

      if (tile.dataset.type === "clue") {
        clearSelected("clue");
        tile.classList.add("selected");
        selClue = tile;
      } else {
        clearSelected("answer");
        tile.classList.add("selected");
        selAns = tile;
      }

      if (selClue && selAns) {
        tryMatch();
      }
    }

    function tryMatch() {
      const clueTile = selClue;
      const answerTile = selAns;
      selClue = null;
      selAns = null;

      if (clueTile.dataset.id === answerTile.dataset.id) {
        clueTile.classList.remove("selected");
        answerTile.classList.remove("selected");
        clueTile.classList.add("matched");
        answerTile.classList.add("matched");
        matched += 1;
        updateStats();
        if (matched === pairs.length) {
          window.setTimeout(showResult, 320);
        }
        return;
      }

      errors += 1;
      clueTile.classList.remove("selected");
      answerTile.classList.remove("selected");
      clueTile.classList.add("flashing");
      answerTile.classList.add("flashing");
      updateStats();
      window.setTimeout(() => {
        clueTile.classList.remove("flashing");
        answerTile.classList.remove("flashing");
      }, 400);
    }

    function showResult() {
      const total = pairs.length;
      const pct = Math.round((total / ((total + errors) || 1)) * 100);
      elements.resultScore.textContent = `${pct}%`;
      elements.resultScore.className = `big ${pct === 100 ? "perfect" : pct >= 70 ? "good" : "bad"}`;

      if (errors === 0) {
        elements.resultText.textContent = "這輪完全答對，可以直接切換其他欄位或群組。";
      } else if (pct >= 70) {
        elements.resultText.textContent = `共 ${total} 題，錯 ${errors} 次，再刷一次就會更穩。`;
      } else {
        elements.resultText.textContent = `共 ${total} 題，錯 ${errors} 次，建議先看顯示答案再回來配對。`;
      }

      elements.resultCard.classList.add("show");
    }

    function renderAnswers() {
      elements.answerBody.innerHTML = "";
      const fieldLabel = getFieldLabel();
      elements.fieldHeader.textContent = fieldLabel;
      elements.fieldHeaderLabel.textContent = fieldLabel;

      if (pairs.length === 0) {
        const emptyRow = document.createElement("tr");
        const emptyCell = document.createElement("td");
        emptyCell.colSpan = 2;
        emptyCell.textContent = "目前這個群組在這個欄位沒有可配對的資料。";
        emptyRow.appendChild(emptyCell);
        elements.answerBody.appendChild(emptyRow);
        return;
      }

      pairs.forEach((pair) => {
        const row = document.createElement("tr");
        const clueCell = document.createElement("td");
        const answerCell = document.createElement("td");
        clueCell.textContent = pair.clue;
        answerCell.textContent = pair.answer;
        row.appendChild(clueCell);
        row.appendChild(answerCell);
        elements.answerBody.appendChild(row);
      });
    }

    function setAnswerMode(nextMode) {
      answerMode = nextMode;
      if (answerMode) {
        renderAnswers();
      }

      elements.quizView.classList.toggle("hidden", answerMode);
      elements.statusBar.classList.toggle("hidden", answerMode);
      elements.answerView.classList.toggle("hidden", !answerMode);
      elements.resultCard.classList.remove("show");
      elements.toggleAnswerBtn.textContent = answerMode ? "返回配對" : "顯示答案";
      elements.toggleAnswerBtn.setAttribute("aria-pressed", answerMode ? "true" : "false");
    }

    function showAnswers() {
      setAnswerMode(true);
    }

    function hideAnswers() {
      setAnswerMode(false);
    }

    function startGame() {
      pairs = buildPool();
      matched = 0;
      errors = 0;
      selClue = null;
      selAns = null;
      elements.resultCard.classList.remove("show");
      elements.fieldHeaderLabel.textContent = getFieldLabel();
      renderFilters();
      renderBoard();
      updateStats();
    }

    function applyConfig() {
      const title = config.title || "配合題網站";
      const subtitle = config.subtitle || "點左欄線索，再點右欄答案完成配對";
      const answerLabel = config.answerLabel || "答案";

      document.title = title;
      elements.title.textContent = title;
      elements.subtitle.textContent = subtitle;
      elements.answerColLabel.textContent = answerLabel;
      elements.answerTableHeader.textContent = answerLabel;
    }

    elements.resetBtn.addEventListener("click", () => {
      hideAnswers();
      startGame();
    });

    elements.playAgainBtn.addEventListener("click", () => {
      hideAnswers();
      startGame();
    });

    elements.toggleAnswerBtn.addEventListener("click", () => {
      if (answerMode) {
        hideAnswers();
      } else {
        showAnswers();
      }
    });

    applyConfig();
    startGame();
  </script>
</body>
</html>
