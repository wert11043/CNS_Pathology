<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神經病理 配合題</title>
  <style>
    :root {
      --primary: #2563eb;
      --correct: #16a34a;
      --wrong: #dc2626;
      --selected: #7c3aed;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --group: #0f766e;
      --topic: #7c3aed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem 1rem 3rem;
    }
    header { text-align: center; padding: 1.25rem 0 0.75rem; }
    header h1 { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
    header p { font-size: .85rem; color: var(--muted); margin-top: .2rem; line-height: 1.45; }
    .section-label {
      font-size: .7rem; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); font-weight: 700; text-align: center; margin: .5rem 0 .2rem;
    }
    .categories { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; margin: .2rem 0; }
    .cat-btn {
      padding: .4rem .9rem; border: 2px solid var(--border); border-radius: 999px;
      background: var(--card); cursor: pointer; font-size: .8rem; font-weight: 600;
      color: var(--muted); transition: all .15s;
    }
    .cat-btn:hover { border-color: var(--primary); color: var(--primary); }
    .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .categories-topics .cat-btn.active { background: var(--topic); border-color: var(--topic); }
    .categories-secondary .cat-btn.active { background: var(--group); border-color: var(--group); }
    .toolbar { display: flex; justify-content: center; gap: .5rem; margin: .75rem 0; flex-wrap: wrap; }
    .tool-btn {
      padding: .4rem 1rem; border: 2px solid var(--border); border-radius: .5rem;
      background: var(--card); cursor: pointer; font-size: .8rem; font-weight: 600;
      color: var(--muted); transition: all .15s;
    }
    .tool-btn:hover { border-color: var(--primary); color: var(--primary); }
    .tool-btn.answer-btn { border-color: #d97706; color: #d97706; }
    .tool-btn.answer-btn:hover { background: #fffbeb; }
    .status { text-align: center; font-size: .82rem; color: var(--muted); margin-bottom: .75rem; }
    .status b { color: var(--text); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; max-width: 1100px; margin: 0 auto; }
    .col-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 700; text-align: center; margin-bottom: .3rem; }
    .col { display: flex; flex-direction: column; gap: .45rem; }
    .tile {
      padding: .7rem .9rem; border: 2px solid var(--border); border-radius: .6rem;
      background: var(--card); cursor: pointer; font-size: .82rem; line-height: 1.48;
      transition: border-color .12s, background .12s, opacity .12s;
      user-select: none; min-height: 2.9rem; text-align: left;
    }
    .tile:hover:not(.matched):not(.flashing) { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .tile.selected { border-color: var(--selected); background: #f5f3ff; }
    .tile.matched { border-color: var(--correct); background: #f0fdf4; color: var(--correct); cursor: default; opacity: .75; }
    .tile.flashing { border-color: var(--wrong); background: #fef2f2; animation: shake .35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    .result { display: none; text-align: center; max-width: 420px; margin: 1.5rem auto 0; padding: 1.75rem 1.5rem; background: var(--card); border: 2px solid var(--border); border-radius: 1.25rem; box-shadow: 0 4px 24px rgba(0,0,0,.07); }
    .result.show { display: block; }
    .result .big { font-size: 3.5rem; font-weight: 900; line-height: 1; }
    .result .big.perfect { color: var(--correct); }
    .result .big.good { color: #d97706; }
    .result .big.bad { color: var(--wrong); }
    .result p { color: var(--muted); margin: .6rem 0 1.25rem; font-size: .9rem; line-height: 1.55; }
    .result button { padding: .65rem 1.5rem; background: var(--primary); color: #fff; border: none; border-radius: .6rem; cursor: pointer; font-size: .95rem; font-weight: 700; }
    .result button:hover { background: #1d4ed8; }
    #answerView { max-width: 1100px; margin: 0 auto; }
    .answer-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .answer-table th { background: var(--primary); color: #fff; padding: .5rem .75rem; text-align: left; font-weight: 700; font-size: .75rem; letter-spacing: .04em; }
    .answer-table th:first-child { border-radius: .5rem 0 0 0; }
    .answer-table th:last-child  { border-radius: 0 .5rem 0 0; }
    .answer-table td { padding: .58rem .75rem; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.48; background: var(--card); }
    .answer-table tr:nth-child(even) td { background: #f8fafc; }
    .answer-table tr:last-child td { border-bottom: none; }
    .hidden { display: none !important; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    @media (max-width: 560px) { .tile { font-size: .79rem; } }
  </style>
</head>

        { group:"室管膜腫瘤", answer:"Ependymoma", type_grading:"Ependymal tumor；most grade 2, grade 3 variants exist", age:"Children near 4th ventricle；adults in spinal cord", criteria:"Tumor near ependyma-lined ventricular system；location + molecular subtype determine classification", grading_criteria:"Grade 3：increased cellularity, mitoses, necrosis, microvascular proliferation", location:"Ventricular system and spinal cord", imaging:"Gross can fill 4th ventricle", molecular:"ZFTA fusion（ST）；EZHIP/H3K28M（PF-A, poor）；NF2（SP）；MYCN（SP, poor）", histology:"Perivascular pseudorosette（最重要）；ependymal rosette；round/oval nuclei；fibrillary background", ihc_test:"Subtype classification by location + molecular, not single IHC", prognosis:"PFA poor；resection extent and molecular subtype > grade" },

        { group:"腦膜腫瘤", answer:"Meningioma", type_grading:"Meningeal tumor；most common extra-axial CNS tumor；WHO grade 1-3", age:"Predominantly adults；F:M ~2-3:1；uncommon in children", criteria:"Arachnoid meningothelial tumor attached to dura；NF2 → multiple lesions", grading_criteria:"Grade 2：≥4 mitoses/10 HPF, brain invasion, or ≥3/5 atypical features；grade 3：≥20 mitoses, frank anaplasia, TERT mutation, or CDKN2A/B hom del", clinical:"Usually slow-growing；vague symptoms or focal deficits from mass effect", location:"Dural-based；parasagittal falx, convexity, sphenoid wing, posterior fossa", imaging:"Broad-based dural mass；MRI dural tail sign；solid globular circumscribed", molecular:"NF2 central（sporadic ~50-60%）；also SMO, AKT1, TRAF7, KLF4, POLR2A, BAP1, CDKN2A", histology:"Whorling pattern, psammoma bodies, transitional pattern, nuclear pseudoinclusions", ihc_test:"TERT promoter mutation or CDKN2A/B hom del → grade 3 upgrade", prognosis:"Total excision grade 1/2 does well；grade 3 poor" },
        { group:"血液淋巴腫瘤", answer:"Primary CNS Lymphoma", type_grading:"Hematolymphoid tumor；most common = diffuse large B-cell lymphoma（CD20+）", age:"Non-immunosuppressed：frequency increases after age 60", criteria:"Occurs first in CNS without systemic lymphoma evidence", clinical:"May involve eye；immunosuppressed：EBV-associated；non-immunosuppressed：PDL1 amp/overexpression", location:"Often multifocal；periventricular；basal ganglia + thalamus bilateral；eye may be involved", imaging:"MRI periventricular enhancing masses", molecular:"Immunosuppressed：EBV-associated；non-immunosuppressed：PDL1 amplification", histology:"Large atypical lymphoid cells with perivascular cuffing；subarachnoid spread", ihc_test:"CD20 IHC positive；Liu stain smear shows large atypical lymphoid cells" },
        { group:"轉移性腫瘤", answer:"Metastatic tumors to CNS", type_grading:"Secondary CNS tumors；no WHO grading", criteria:"Secondary CNS tumors derived from systemic primary sites", clinical:"Can be first sign of systemic cancer；solitary → local treatment；leptomeningeal carcinomatosis → hard to treat", location:"Gray-white matter junction throughout cerebral hemispheres and cerebellum", imaging:"MRI：multiple ring-enhancing lesions at gray-white junction；peri-focal edema" }

    }
  };

  const TOPIC_ORDER = ["cells","cell_response","demyelinating","neurodegen","infection","cerebrovascular","tumor"];

  let currentTopicKey = "neurodegen";
  let currentGroup = "";
  let currentField = "";
  let pairs = [];
  let matched = 0;
  let errors = 0;
  let selClue = null;
  let selAns = null;
  let answerMode = false;

  const el = {
    title: document.getElementById("pageTitle"),
    subtitle: document.getElementById("pageSubtitle"),
    answerColLabel: document.getElementById("answerColLabel"),
    answerTableHeader: document.getElementById("answerTableHeader"),
    fieldHeaderLabel: document.getElementById("fieldHeaderLabel"),
    topicChips: document.getElementById("topicChips"),
    groupChips: document.getElementById("groupChips"),
    fieldChips: document.getElementById("fieldChips"),
    clueCol: document.getElementById("clueCol"),
    answerCol: document.getElementById("answerCol"),
    progressText: document.getElementById("progressText"),
    errorText: document.getElementById("errorText"),
    statusBar: document.getElementById("statusBar"),
    quizView: document.getElementById("quizView"),
    answerView: document.getElementById("answerView"),
    answerBody: document.getElementById("answerBody"),
    fieldHeader: document.getElementById("fieldHeader"),
    toggleAnswerBtn: document.getElementById("toggleAnswerBtn"),
    resultCard: document.getElementById("resultCard"),
    resultScore: document.getElementById("resultScore"),
    resultText: document.getElementById("resultText"),
    resetBtn: document.getElementById("resetBtn"),
    playAgainBtn: document.getElementById("playAgainBtn")
  };

  function getTopic() { return ALL_TOPICS[currentTopicKey]; }

  function shuffle(list) { return [...list].sort(() => Math.random() - 0.5); }

  function getFieldLabel() {
    return getTopic().fieldOptions.find(f => f.key === currentField)?.label ?? currentField;
  }

  function buildPool() {
    const t = getTopic();
    const mixedLabel = "全部混合";
    let pool = t.rows;
    if (currentGroup !== mixedLabel) {
      pool = pool.filter(r => r.group === currentGroup);
    }
    pool = pool.filter(r => {
      const v = r[currentField];
      return typeof v === "string" && v.trim().length > 0 && typeof r.answer === "string" && r.answer.trim().length > 0;
    });
    if (currentGroup === mixedLabel && pool.length > (t.mixedLimit || 16)) {
      pool = shuffle(pool).slice(0, t.mixedLimit || 16);
    }
    return pool.map((r, i) => ({ id: `${r.group}-${r.answer}-${i}`, clue: r[currentField], answer: r.answer }));
  }

  function updateStats() {
    el.progressText.textContent = `${matched} / ${pairs.length}`;
    el.errorText.textContent = String(errors);
  }

  function chip(text, active, onClick, extraClass) {
    const b = document.createElement("button");
    b.type = "button";
    b.className = `cat-btn${active ? " active" : ""}`;
    if (extraClass) b.className += " " + extraClass;
    b.textContent = text;
    b.addEventListener("click", onClick);
    return b;
  }

  function renderFilters() {
    const t = getTopic();
    // topics
    el.topicChips.innerHTML = "";
    TOPIC_ORDER.forEach(key => {
      el.topicChips.appendChild(chip(ALL_TOPICS[key].label, key === currentTopicKey, () => {
        currentTopicKey = key;
        currentGroup = ALL_TOPICS[key].defaultGroup;
        currentField = ALL_TOPICS[key].defaultField;
        hideAnswers();
        startGame();
      }));
    });
    // groups
    el.groupChips.innerHTML = "";
    t.groupOptions.forEach(g => {
      el.groupChips.appendChild(chip(g, g === currentGroup, () => {
        currentGroup = g;
        hideAnswers();
        startGame();
      }));
    });
    // fields
    el.fieldChips.innerHTML = "";
    t.fieldOptions.forEach(f => {
      el.fieldChips.appendChild(chip(f.label, f.key === currentField, () => {
        currentField = f.key;
        hideAnswers();
        startGame();
      }));
    });
  }

  function makeTile(text, id, type) {
    const b = document.createElement("button");
    b.type = "button"; b.className = "tile";
    b.textContent = text; b.dataset.id = id; b.dataset.type = type;
    b.addEventListener("click", () => onTile(b));
    return b;
  }

  function renderBoard() {
    const sc = shuffle(pairs.map(p => ({ id: p.id, text: p.clue })));
    const sa = shuffle(pairs.map(p => ({ id: p.id, text: p.answer })));
    el.clueCol.innerHTML = ""; el.answerCol.innerHTML = "";
    sc.forEach(item => el.clueCol.appendChild(makeTile(item.text, item.id, "clue")));
    sa.forEach(item => el.answerCol.appendChild(makeTile(item.text, item.id, "answer")));
  }

  function clearSelected(type) {
    document.querySelectorAll(`.tile[data-type="${type}"].selected`).forEach(t => t.classList.remove("selected"));
  }

  function onTile(tile) {
    if (tile.classList.contains("matched") || tile.classList.contains("flashing")) return;
    if (tile.dataset.type === "clue") { clearSelected("clue"); tile.classList.add("selected"); selClue = tile; }
    else { clearSelected("answer"); tile.classList.add("selected"); selAns = tile; }
    if (selClue && selAns) tryMatch();
  }

  function tryMatch() {
    const c = selClue, a = selAns;
    selClue = null; selAns = null;
    if (c.dataset.id === a.dataset.id) {
      c.classList.remove("selected"); a.classList.remove("selected");
      c.classList.add("matched"); a.classList.add("matched");
      matched++; updateStats();
      if (matched === pairs.length) setTimeout(showResult, 320);
      return;
    }
    errors++;
    c.classList.remove("selected"); a.classList.remove("selected");
    c.classList.add("flashing"); a.classList.add("flashing");
    updateStats();
    setTimeout(() => { c.classList.remove("flashing"); a.classList.remove("flashing"); }, 400);
  }

  function showResult() {
    const total = pairs.length;
    const pct = Math.round((total / ((total + errors) || 1)) * 100);
    el.resultScore.textContent = `${pct}%`;
    el.resultScore.className = `big ${pct === 100 ? "perfect" : pct >= 70 ? "good" : "bad"}`;
    el.resultText.textContent = errors === 0
      ? "這輪完全答對，可以切換其他欄位或群組。"
      : pct >= 70
        ? `共 ${total} 題，錯 ${errors} 次，再刷一次會更穩。`
        : `共 ${total} 題，錯 ${errors} 次，建議先看顯示答案再回來配對。`;
    el.resultCard.classList.add("show");
  }

  function renderAnswers() {
    el.answerBody.innerHTML = "";
    const label = getFieldLabel();
    el.fieldHeader.textContent = label;
    el.fieldHeaderLabel.textContent = label;
    if (pairs.length === 0) {
      const tr = document.createElement("tr");
      const td = document.createElement("td"); td.colSpan = 2;
      td.textContent = "此群組在此欄位沒有可配對的資料。";
      tr.appendChild(td); el.answerBody.appendChild(tr); return;
    }
    pairs.forEach(p => {
      const tr = document.createElement("tr");
      const tc = document.createElement("td"); tc.textContent = p.clue;
      const ta = document.createElement("td"); ta.textContent = p.answer;
      tr.appendChild(tc); tr.appendChild(ta); el.answerBody.appendChild(tr);
    });
  }

  function setAnswerMode(next) {
    answerMode = next;
    if (answerMode) renderAnswers();
    el.quizView.classList.toggle("hidden", answerMode);
    el.statusBar.classList.toggle("hidden", answerMode);
    el.answerView.classList.toggle("hidden", !answerMode);
    el.resultCard.classList.remove("show");
    el.toggleAnswerBtn.textContent = answerMode ? "返回配對" : "顯示答案";
  }

  function hideAnswers() { setAnswerMode(false); }

  function startGame() {
    const t = getTopic();
    document.title = `${t.label} 配合題`;
    el.title.textContent = "神經病理 配合題";
    el.subtitle.textContent = `主題：${t.label}　｜　選群組 → 選欄位 → 左右配對`;
    el.answerColLabel.textContent = t.answerLabel;
    el.answerTableHeader.textContent = t.answerLabel;
    pairs = buildPool();
    matched = 0; errors = 0; selClue = null; selAns = null;
    el.resultCard.classList.remove("show");
    el.fieldHeaderLabel.textContent = getFieldLabel();
    renderFilters();
    renderBoard();
    updateStats();
  }

  el.resetBtn.addEventListener("click", () => { hideAnswers(); startGame(); });
  el.playAgainBtn.addEventListener("click", () => { hideAnswers(); startGame(); });
  el.toggleAnswerBtn.addEventListener("click", () => answerMode ? hideAnswers() : setAnswerMode(true));

  startGame();
  </script>
</body>
